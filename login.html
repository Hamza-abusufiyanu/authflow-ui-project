<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthFlow - Login</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        accent: '#7C3AED',
                        neutral: '#F3F4F6',
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { font-family: Inter, sans-serif; }
    </style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<!-- Login Card -->
<div class="bg-white shadow-lg rounded-2xl w-full max-w-md p-8">

    <!-- Title -->
    <h2 class="text-3xl font-bold text-center text-indigo-600 mb-6">
        Welcome Back
    </h2>

    <p class="text-center text-gray-500 mb-8">
        Login to continue to AuthFlow
    </p>

    <!-- Form -->
    <form>

        <!-- Email -->
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Email</label>
            <input type="email"
                   class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   placeholder="Enter your email">
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Password</label>
            <input type="password"
                   class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   placeholder="Enter your password">
        </div>

        <!-- Remember + Forgot -->
        <div class="flex justify-between items-center mb-6 text-sm">

            <label class="flex items-center">
                <input type="checkbox" class="mr-2">
                Remember me
            </label>

            <a href="forgot-password.html" class="text-indigo-600 hover:underline">
                Forgot Password?
            </a>

        </div>

        <!-- Button -->
        <button type="button"
                class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700">
            Login
        </button>

    </form>

    <!-- Signup Link -->
    <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="signup.html" class="text-indigo-600 hover:underline">
            Sign up
        </a>
    </p>

</div>


</body>
</html>

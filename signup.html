<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AuthFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white shadow-lg rounded-xl w-full max-w-md p-8">

        <!-- Logo / Title -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-indigo-600">AuthFlow</h1>
            <p class="text-gray-500 mt-2">Create your account</p>
        </div>

        <!-- Signup Form -->
        <form>

            <!-- Full Name -->
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">
                    Full Name
                </label>
                <input
                    type="text"
                    placeholder="Enter your full name"
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                >
            </div>

            <!-- Email -->
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">
                    Email Address
                </label>
                <input
                    type="email"
                    placeholder="Enter your email"
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                >
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">
                    Password
                </label>
                <input
                    type="password"
                    placeholder="Create a password"
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                >
            </div>

            <!-- Confirm Password -->
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">
                    Confirm Password
                </label>
                <input
                    type="password"
                    placeholder="Confirm your password"
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                >
            </div>

            <!-- Submit Button -->
            <button
                type="submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition duration-300"
            >
                Create Account
            </button>

        </form>

        <!-- Login Link -->
        <div class="text-center mt-6">
            <p class="text-gray-600">
                Already have an account?
                <a href="login.html" class="text-indigo-600 font-semibold hover:underline">
                    Login
                </a>
            </p>
        </div>

    </div>

</body>
</html>
